schema: 1

bugzilla:
  product: Core
  component: Graphics

origin:
  name: angle

  description: ANGLE - Almost Native Graphics Layer Engine

  url: https://chromium.googlesource.com/angle/angle

  release: commit 9fa37b5e144119f3dd266e6e066a528a1bfac22c Thu Jun 04 17:03:24 2026 -0700
  revision: 9fa37b5e144119f3dd266e6e066a528a1bfac22c

  license: BSD-3-Clause

updatebot:
  maintainer-phab: ahale
  maintainer-bz: ahale@mozilla.com
  tasks:
    - type: commit-alert
      enabled: True
      branch: chromium/7778
      needinfo: ["ahale@mozilla.com"]

vendoring:
  url: https://chromium.googlesource.com/angle/angle
  source-hosting: angle
  vendor-directory: third_party/angle
  skip-vendoring-steps:
    - move-contents
    - update-moz-build

  update-actions:
    - action: run-command
      command: ./mach
      args:
        - python
        - --
        - '{yaml_dir}/update-angle.py'
        - '{tmpextractdir}'
        - '{vendor_dir}'
      cwd: '{topsrcdir}'
