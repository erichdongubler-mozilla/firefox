# bug 2050692: a fractional layout *origin* no longer snaps the way a fractional
# *transform* does. An origin-offset reference frame (snap-text-offset.yaml, an
# identity-transform stacking context at bounds [0.5, 0.5]) leaves the text at its
# true sub-pixel position - identical to drawing the same glyphs with no frame,
# shifted by the same 0.5px. (A fractional transform, by contrast, still snaps -
# see subpixel-translate / fractional-filter.)
root:
  items:
    - bounds: [0, 0, 200, 100]
      glyphs: [68, 3, 37, 70, 71, 3, 40, 73, 74, 75]
      offsets: [20.8, 50.5, 35.5, 50.5, 43.5, 50.99, 61.7, 50.5, 75.9, 50.5, 91.1, 50.5, 99.3, 50.5, 117.2, 50.5, 124.6, 50.5, 140, 50.5]
      size: 20
      font: "FreeSans.ttf"
