---
loader: taskgraph.loader.transform:loader

kind-dependencies:
    - toolchain

transforms:
    - gecko_taskgraph.transforms.try_job:transforms
    - gecko_taskgraph.transforms.job:transforms
    - gecko_taskgraph.transforms.task:transforms

task-defaults:
    treeherder:
        kind: build
        platform: toolchains/opt
        tier: 1
    run-on-projects: []
    run:
        using: toolchain-script
    worker-type: b-linux-amd
    worker:
        max-run-time: 1800
    use-python: default

tasks:
    win64-dxc:
        description: "DirectX Shader Compiler (x86_64)"
        attributes:
            local-toolchain: true
        treeherder:
            symbol: TW64(dxc)
        worker:
            env:
                MACH_BUILD_PYTHON_NATIVE_PACKAGE_SOURCE: system
                MAKECAB: /builds/worker/fetches/makecab/makecab
        run:
            script: build-dxc.sh
            sparse-profile: null
            arguments:
                - "x86_64"
            toolchain-artifact: public/build/dxc-x86_64-pc-windows-msvc.tar.zst
            toolchain-alias: dxc-x86_64-pc-windows-msvc
        fetches:
            toolchain:
                - linux64-clang-toolchain
                - linux64-dump_syms
                - linux64-makecab
                - vs-toolchain
            fetch:
                - dxc-src

    win64-aarch64-dxc:
        description: "DirectX Shader Compiler (aarch64)"
        attributes:
            local-toolchain: true
        treeherder:
            symbol: TWA64(dxc)
        worker:
            env:
                MACH_BUILD_PYTHON_NATIVE_PACKAGE_SOURCE: system
                MAKECAB: /builds/worker/fetches/makecab/makecab
        run:
            script: build-dxc.sh
            sparse-profile: null
            arguments:
                - "aarch64"
            toolchain-artifact: public/build/dxc-aarch64-pc-windows-msvc.tar.zst
            toolchain-alias: dxc-aarch64-pc-windows-msvc
        fetches:
            toolchain:
                - linux64-clang-toolchain
                - linux64-dump_syms
                - linux64-makecab
                - vs-toolchain
            fetch:
                - dxc-src
